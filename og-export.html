<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Exportar OG Image · HadesCreative</title>
<style>
    body { font-family: system-ui, sans-serif; background: #0a0101; color: #fff; padding: 2rem; max-width: 900px; margin: 0 auto; }
    h1 { color: #e11d48; }
    .preview { border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; margin: 1.5rem 0; }
    .preview img, .preview canvas { display: block; width: 100%; height: auto; }
    button { background: linear-gradient(135deg, #e11d48, #ff2d55); color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    code { background: #181010; padding: 2px 8px; border-radius: 4px; color: #ff8888; }
    .info { background: #181010; border-left: 3px solid #e11d48; padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; margin: 1rem 0; }
</style>
</head>
<body>
<h1>Exportar OG Image</h1>
<p>Esta página convierte tu <code>assets/og-image.svg</code> a PNG de 1200×630 px (formato exacto para Open Graph).</p>

<div class="preview">
    <img id="src" src="assets/og-image.svg" alt="OG Preview">
</div>

<div class="info">
    <strong>Instrucciones:</strong>
    <ol>
        <li>Haz clic en el botón de abajo</li>
        <li>Se descargará <code>og-image.png</code></li>
        <li>Mueve ese archivo a <code>assets/og-image.png</code></li>
        <li>Listo — ya está enlazado en el HTML</li>
    </ol>
</div>

<button onclick="exportPNG()">Descargar og-image.png (1200×630)</button>

<canvas id="canvas" width="1200" height="630" style="display:none;"></canvas>

<script>
function exportPNG() {
    const img = document.getElementById('src');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fetch('assets/og-image.svg')
        .then(r => r.text())
        .then(svgText => {
            const blob = new Blob([svgText], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const tmp = new Image();
            tmp.onload = () => {
                ctx.fillStyle = '#0a0101';
                ctx.fillRect(0, 0, 1200, 630);
                ctx.drawImage(tmp, 0, 0, 1200, 630);
                URL.revokeObjectURL(url);
                canvas.toBlob(b => {
                    const dl = document.createElement('a');
                    dl.href = URL.createObjectURL(b);
                    dl.download = 'og-image.png';
                    dl.click();
                }, 'image/png');
            };
            tmp.src = url;
        });
}
</script>
</body>
</html>
