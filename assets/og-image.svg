<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0101"/>
      <stop offset="50%" stop-color="#1a0508"/>
      <stop offset="100%" stop-color="#080203"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="35%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ff2d55" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#e11d48" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Fondo base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Borde superior gradiente -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#brand)"/>

  <!-- Etiqueta superior -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="280" height="42" rx="21" fill="#e11d48" fill-opacity="0.1" stroke="#e11d48" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="140" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e11d48" text-anchor="middle" letter-spacing="2">DISEÑO &amp; DESARROLLO WEB</text>
  </g>

  <!-- Logo / Title -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Hades<tspan fill="url(#brand)">Creative</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Hago realidad la web que <tspan fill="url(#brand)">imaginaste</tspan>
  </text>

  <!-- Descripción -->
  <text x="80" y="385" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#a0a0a0">
    Páginas web profesionales · Tiendas online · CRMs personalizados
  </text>

  <!-- Servicios chips -->
  <g transform="translate(80, 460)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="50" rx="25" fill="#181010" stroke="#e11d48" stroke-opacity="0.25" stroke-width="1"/>
      <text x="90" y="32" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Web Completa</text>
    </g>
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="50" rx="25" fill="#181010" stroke="#e11d48" stroke-opacity="0.25" stroke-width="1"/>
      <text x="90" y="32" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Tienda Online</text>
    </g>
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="220" height="50" rx="25" fill="#181010" stroke="#e11d48" stroke-opacity="0.25" stroke-width="1"/>
      <text x="110" y="32" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">CRM Personalizado</text>
    </g>
  </g>

  <!-- Elemento decorativo: código en la esquina -->
  <g transform="translate(900, 200)" opacity="0.5">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#e11d48">&lt;/&gt;</text>
    <text x="0" y="35" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.4">const web =</text>
    <text x="0" y="60" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.4">  await create({</text>
    <text x="0" y="85" font-family="'Courier New', monospace" font-size="14" fill="#e11d48" opacity="0.6">    cliente: 'tú',</text>
    <text x="0" y="110" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.4">    estilo: 'premium',</text>
    <text x="0" y="135" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.4">  });</text>
  </g>

  <!-- Footer -->
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#666666">hadescreative.com</text>
  <g transform="translate(950, 565)">
    <circle cx="12" cy="12" r="6" fill="#22c55e"/>
    <text x="30" y="17" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#a0a0a0">Disponible para nuevos proyectos</text>
  </g>
</svg>
